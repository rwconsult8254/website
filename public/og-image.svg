<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#111318"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent line at top -->
  <rect x="0" y="0" width="1200" height="4" fill="#3b82f6"/>

  <!-- Hexagon logo (larger, positioned left) -->
  <g transform="translate(140, 235)">
    <polygon points="60,0 110,29 110,87 60,116 10,87 10,29"
      fill="#3b82f6" opacity="0.12"/>
    <polygon points="60,0 110,29 110,87 60,116 10,87 10,29"
      stroke="#3b82f6" stroke-width="3" fill="none"/>
    <text x="60" y="66" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
      font-size="30" font-weight="700" fill="#3b82f6" letter-spacing="-1">RW</text>
  </g>

  <!-- Site name -->
  <text x="310" y="280" font-family="system-ui, -apple-system, sans-serif"
    font-size="52" font-weight="700" fill="#e4e4e7" letter-spacing="-1">Roger Wibrew</text>

  <!-- Tagline -->
  <text x="310" y="330" font-family="system-ui, -apple-system, sans-serif"
    font-size="24" fill="#a1a1aa">Chemical Engineering · Process Simulation · AI</text>

  <!-- Domain -->
  <text x="310" y="380" font-family="system-ui, -apple-system, sans-serif"
    font-size="20" fill="#3b82f6">rogerwibrew.com</text>

  <!-- Bottom border accent -->
  <rect x="0" y="626" width="1200" height="4" fill="#3b82f6"/>
</svg>
